version: '3.8'

services:
  rpk-faucet-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL
        - VITE_STELLAR_CONTRACT_ADDRESS
        - VITE_SEPOLIA_CONTRACT_ADDRESS
    container_name: rpk-faucet-web
    ports:
      - "8080:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
